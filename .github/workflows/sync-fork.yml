name: Sync Fork from maillab/cloud-mail
on:
  schedule:
    - cron: "0 1 * * *"   # 每天 UTC 1点（北京时间 9点）自动同步
  workflow_dispatch:      # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: tgymnich/fork-sync@v2.0
        with:
          owner: maillab
          repo: cloud-mail
          base: main
          head: main
