name: 自动同步上游tgymnich/fork-sync仓库
on:
  schedule:
    # 每天北京时间凌晨2点自动同步，可按需调整cron时间
    - cron: '0 18 * * *'
  # 支持手动点击立即同步
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 检出你的fork仓库代码
        uses: actions/checkout@v4
        with:
          # 如果你自己的仓库默认分支是master，把这里改成master即可
          ref: master
          fetch-depth: 0

      - name: 配置Git身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 拉取上游tgymnich/fork-sync最新更新
        run: |
          git remote add upstream https://github.com/tgymnich/fork-sync.git
          git fetch upstream
          # 快进合并：没有冲突自动合并，有冲突直接失败通知你，不会覆盖你的修改
          git merge upstream/main --no-edit --ff-only

      - name: 推送到你自己的仓库
        run: |
          # 如果你自己的仓库默认分支是master，把这里改成master即可
          git push origin master

#开启权限：进入仓库「Settings」→ 左侧菜单选择「Actions」→「General」→ 找到「Workflow permissions」板块，选择「Read and write permissions」，点击保存
